# Upstream ABI+bytecode under helpers/abis/zkp/v0.2.2/; factory at helpers/abis/. ZKP root v0.2.2.
contracts:
  factory:
    abiAndBytecode:
      path: ./helpers/abis/ZetoFactory.json
  # the Zeto factory is a CloneFactory, which needs implementation
  # contracts to be set
  implementations:
    - name: Groth16Verifier_NfAnon
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.2.2/Groth16Verifier_NfAnon.json
    - name: Zeto_NfAnon
      verifier: Groth16Verifier_NfAnon
      circuits:
        transfer:
          name: nf_anon
        transferLocked:
          name: nf_anon
        deposit:
          name: not_implemented
        withdraw:
          name: not_implemented
      cloneable: true
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.2.2/Zeto_NfAnon.json
