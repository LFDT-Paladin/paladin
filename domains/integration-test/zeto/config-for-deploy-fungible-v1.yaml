# Upstream implementation + verifier ABI+bytecode: helpers/abis/zkp/v0.5.1/ (Gradle copyZetoUpstreamContractAbis_*).
# Paladin ZetoFactoryV1 ABI stays at helpers/abis/. Fungible V1 suite: ZKP root v0.5.1 (helpers.ZetoZKArtifactRootV051).
contracts:
  factory:
    abiAndBytecode:
      path: ./helpers/abis/ZetoFactoryV1.json
  # the Zeto factory is a CloneFactory, which needs implementation
  # contracts to be set
  implementations:
    # Linked by v0.5.x lockable token implementations (Zeto_Anon, Zeto_AnonNullifier, etc.)
    - name: ZetoLockableLib
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/ZetoLockableLib.json
    # for the deposit transaction
    - name: Groth16Verifier_Deposit
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_Deposit.json
    # for the withdraw transaction
    - name: Groth16Verifier_Withdraw
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_Withdraw.json
    # for the withdraw transaction with batch inputs
    - name: Groth16Verifier_WithdrawBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_WithdrawBatch.json
    # for the Zeto_Anon token
    - name: Groth16Verifier_Anon
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_Anon.json
    - name: Groth16Verifier_AnonBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonBatch.json
    - name: Groth16Verifier_Burn
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_Burn.json
    - name: Groth16Verifier_BurnBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_BurnBatch.json
    - name: Zeto_Anon
      verifier: Groth16Verifier_Anon
      batchVerifier: Groth16Verifier_AnonBatch
      depositVerifier: Groth16Verifier_Deposit
      withdrawVerifier: Groth16Verifier_Withdraw
      batchWithdrawVerifier: Groth16Verifier_WithdrawBatch
      # Same as zeto/solidity/scripts/tokens/Zeto_Anon.ts — lock path uses the regular anon verifiers.
      lockVerifier: Groth16Verifier_Anon
      batchLockVerifier: Groth16Verifier_AnonBatch
      circuits:
        deposit:
          name: deposit
          fungible: true
        withdraw:
          name: withdraw
          fungible: true
        transfer:
          name: anon
          fungible: true
        transferLocked:
          name: anon
          fungible: true
      cloneable: true
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Zeto_Anon.json
    # for the Zeto_AnonEnc token
    - name: Groth16Verifier_AnonEnc
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonEnc.json
    - name: Groth16Verifier_AnonEncBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonEncBatch.json
    - name: Zeto_AnonEnc
      verifier: Groth16Verifier_AnonEnc
      batchVerifier: Groth16Verifier_AnonEncBatch
      depositVerifier: Groth16Verifier_Deposit
      withdrawVerifier: Groth16Verifier_Withdraw
      batchWithdrawVerifier: Groth16Verifier_WithdrawBatch
      lockVerifier: Groth16Verifier_AnonEnc
      batchLockVerifier: Groth16Verifier_AnonEncBatch
      circuits:
        deposit:
          name: deposit
          usesEncryption: true
          fungible: true
        withdraw:
          name: withdraw
          usesEncryption: true
          fungible: true
        transfer:
          name: anon_enc
          usesEncryption: true
          fungible: true
        transferLocked:
          name: anon_enc
          usesEncryption: true
          fungible: true
      cloneable: true
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Zeto_AnonEnc.json
    # for the Zeto_AnonNullifier token
    - name: PoseidonUnit2L
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Poseidon2.json
    - name: PoseidonUnit3L
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Poseidon3.json
    - name: SmtLib
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/SmtLib.json
    - name: Groth16Verifier_WithdrawNullifier
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_WithdrawNullifier.json
    - name: Groth16Verifier_WithdrawNullifierBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_WithdrawNullifierBatch.json
    - name: Groth16Verifier_AnonNullifierTransfer
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonNullifierTransfer.json
    - name: Groth16Verifier_AnonNullifierTransferBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonNullifierTransferBatch.json
    # Lock settle uses Groth16Verifier_Anon / AnonBatch (same as Zeto_Anon), not nullifier transferLocked
    # verifiers — see zeto/solidity/ignition/modules/zeto_anon_nullifier.ts (LockVerifierModule).
    - name: Zeto_AnonNullifier
      verifier: Groth16Verifier_AnonNullifierTransfer
      batchVerifier: Groth16Verifier_AnonNullifierTransferBatch
      depositVerifier: Groth16Verifier_Deposit
      withdrawVerifier: Groth16Verifier_WithdrawNullifier
      batchWithdrawVerifier: Groth16Verifier_WithdrawNullifierBatch
      lockVerifier: Groth16Verifier_Anon
      batchLockVerifier: Groth16Verifier_AnonBatch
      circuits:
        deposit:
          name: deposit
        withdraw:
          name: withdraw_nullifier
          usesNullifiers: true
          fungible: true
        transfer:
          name: anon_nullifier_transfer
          usesNullifiers: true
          fungible: true
        transferLocked:
          name: anon
          fungible: true
      cloneable: true
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Zeto_AnonNullifier.json
    # for the Zeto_AnonNullifierKyc token
    - name: Groth16Verifier_AnonNullifierKycTransfer
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonNullifierKycTransfer.json
    - name: Groth16Verifier_AnonNullifierKycTransferBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonNullifierKycTransferBatch.json
    - name: Groth16Verifier_AnonNullifierKycTransferLocked
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonNullifierKycTransferLocked.json
    - name: Groth16Verifier_AnonNullifierKycTransferLockedBatch
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Groth16Verifier_AnonNullifierKycTransferLockedBatch.json
    - name: Zeto_AnonNullifierKyc
      verifier: Groth16Verifier_AnonNullifierKycTransfer
      batchVerifier: Groth16Verifier_AnonNullifierKycTransferBatch
      depositVerifier: Groth16Verifier_Deposit
      withdrawVerifier: Groth16Verifier_WithdrawNullifier
      batchWithdrawVerifier: Groth16Verifier_WithdrawNullifierBatch
      lockVerifier: Groth16Verifier_AnonNullifierKycTransferLocked
      batchLockVerifier: Groth16Verifier_AnonNullifierKycTransferLockedBatch
      circuits:
        deposit:
          name: deposit
        withdraw:
          name: withdraw_nullifier
          usesNullifiers: true
          fungible: true
        transfer:
          name: anon_nullifier_kyc_transfer
          usesNullifiers: true
          usesKyc: true
          fungible: true
        # v0.5 spendLock uses lockVerifier (TransferLocked VK). Locked inputs are commitment-based — no nullifier SMT.
        transferLocked:
          name: anon_nullifier_kyc_transferLocked
          usesKyc: true
          fungible: true
      cloneable: true
      abiAndBytecode:
        path: ./helpers/abis/zkp/v0.5.1/Zeto_AnonNullifierKyc.json
